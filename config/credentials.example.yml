# ─────────────────────────────────────────────────────────────────────────────
# agencios — canonical credentials structure (TEMPLATE, no real secrets here)
#
# This is the single source of truth for the shape of every encrypted credentials
# file. The SAME structure applies to all environments:
#
#   config/credentials.yml.enc                 (shared base — config/master.key)
#   config/credentials/development.yml.enc     (config/credentials/development.key)
#   config/credentials/production.yml.enc      (config/credentials/production.key)
#
# Edit a real file with:
#   EDITOR=nano bin/rails credentials:edit                          # base
#   EDITOR=nano bin/rails credentials:edit --environment production # per-env
#
# App-level secrets (API keys, OAuth client secrets, webhook secrets) live ONLY
# here. Per-workspace / per-user OAuth tokens do NOT — they are `encrypts`-ed on
# the models (SocialAccount, Setting, User). Every key is read via
# `credential(:vendor, :key, env: "ENV_FALLBACK")`, so in local dev you may set
# the ENV fallback in `.env` instead. Anything missing degrades gracefully.
# ─────────────────────────────────────────────────────────────────────────────

# Rails core — generated on first `credentials:edit`. Required in production.
secret_key_base: "<64 hex chars>"

# Active Record Encryption — protects the encrypted token columns.
active_record_encryption:
  primary_key:         "<32+ random chars>"
  deterministic_key:   "<32+ random chars>"
  key_derivation_salt: "<32+ random chars>"

# ─────────────────────────────────────────────────────────────
# Social networks — publishing + analytics (direct integration)
# ─────────────────────────────────────────────────────────────
meta:                            # Instagram + Facebook share ONE Meta app
  app_id:               "..."
  app_secret:           "..."
  webhook_verify_token: "..."    # token set on the Meta webhook subscription
  graph_version:        "v25.0"  # optional — defaults to v25.0

tiktok:
  client_key:     "..."
  client_secret:  "..."
  webhook_secret: "..."

linkedin:
  client_id:     "..."
  client_secret: "..."

x:                               # X / Twitter (OAuth2 PKCE)
  client_id:     "..."
  client_secret: "..."

# ─────────────────────────────────────────────────────────────
# Google — ONE Google Cloud OAuth client for ALL Google surfaces:
#   • Sign in with Google (User#google_uid)
#   • Google Calendar + Meet (Setting google tokens)
#   • YouTube Data API v3 + Analytics (SocialAccount tokens)
# There is no separate `youtube:` block — register every redirect URI
# (/auth/youtube/callback, calendar connect, sign-in) on this one client.
# ─────────────────────────────────────────────────────────────
google:
  client_id:     "...apps.googleusercontent.com"
  client_secret: "GOCSPX-..."

# ─────────────────────────────────────────────────────────────
# Creative generation + AI
# ─────────────────────────────────────────────────────────────
# Text AI. Provider + model routing are edited in /admin (AiConfig) WITHOUT a
# deploy — only the secret API key lives here. `ai_provider` / `openrouter.model`
# / `openrouter.models` below are optional fallbacks used when AiConfig is unset.
ai_provider: "openrouter"        # optional fallback — omit to auto-detect

openrouter:                      # any model by slug — https://openrouter.ai/models
  api_key: "sk-or-..."           # SECRET — stays here (never in the DB)
  model:   "anthropic/claude-sonnet-4.5"   # optional fallback default model
  # models: { summarize_ticket: "google/gemini-2.5-flash", ... }  # optional fallback map
  image_model: "google/gemini-2.5-flash-image"   # optional — image generation model override

anthropic:                       # fallback provider (direct); native web_fetch
  api_key: "sk-ant-..."
  model:   "claude-sonnet-4-6"   # optional — model override

# ─────────────────────────────────────────────────────────────
# SaaS billing — Stripe (charges the workspace)
# ─────────────────────────────────────────────────────────────
stripe:
  secret_key:     "sk_live_..."
  webhook_secret: "whsec_..."
  api_version:    "2025-03-31.basil"   # optional — Billing Meters need Basil+
  prices:                              # Stripe Price ids (no ENV fallback)
    solo:                "price_..."   # licensed (1 seat)
    agencia:             "price_..."   # licensed, per-seat (5–20)
    enterprise:          "price_..."   # licensed, per-seat (20+)
    carousel_generation: "price_..."   # metered → carousel_generation meter
    video_generation:    "price_..."   # metered → video_generation meter

# ─────────────────────────────────────────────────────────────
# Client billing — Mercado Pago (the agency charges its clients)
# ─────────────────────────────────────────────────────────────
mercado_pago:
  access_token:   "APP_USR-..."  # platform token (Pix/boleto/card)
  client_id:      "..."          # per-workspace OAuth (split payments) — optional
  client_secret:  "..."          # optional
  webhook_secret: "..."          # x-signature HMAC secret

# ─────────────────────────────────────────────────────────────
# Web Push (VAPID) — browser notifications (PWA). Required in EVERY environment.
# Generate a pair with: bin/rails runner 'pp WebPush.generate_key' (or webpush gem)
# ─────────────────────────────────────────────────────────────
vapid:
  public_key:  "..."
  private_key: "..."
