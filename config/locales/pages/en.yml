    context_states:
      ideation:
        label: Ideation
        summary: The brief calls for authority + social proof. I suggest 3 “behind the scenes” hooks — this client responds well to transparency.
        fields:
        - Brief
        - Goal
        - Target persona
        - References
      scoping:
        label: Scoping
        summary: 'Scope set: a 6-slide carousel for Instagram + LinkedIn. I created 5 subtasks with effort estimates.'
        fields:
        - Creative type
        - Channels
        - Script
        - Subtasks
        - Deadline
      production:
        label: Production
        summary: Caption aligned with the brief and brand tone. Variation A has the strongest hook for the feed.
        fields:
        - Creative
        - Caption
        - Hashtags
        - Approval
      scheduled:
        label: Scheduled
        summary: 'Best window for this account: Tue/Thu 7pm. I scheduled the carousel and adapted the caption per network.'
        fields:
        - Time per network
        - First comment
        - Link in bio
      published:
        label: Live
        summary: 'Live for 2 days: +38% reach vs. the campaign average. Saves above target.'
        fields:
        - Live posts
        - Reach
        - Saves
        - Alerts
      retrospective:
        label: Retro
        summary: 'Retro draft ready: the behind-the-scenes hook drove reach. Repeat the format next cycle.'
