        - Creatives
    strategist:
      prompt: 2 reels and 1 carousel per week for Bloom's launch, focused on social proof.
      reply: Done. I built a 4-week plan — 12 tickets, each with a brief, channels, and subtasks. Want to apply it to the board?
      tickets:
        t1: Reel — product behind the scenes
        t2: Carousel — 5 niche myths
        t3: Reel — customer testimonial
        t4: Reel — before and after
        t5: Carousel — step by step
        t6: Reel — answering questions
    faqs:
      trial:
        q: How does the trial period work?
        a: You get a %{days}-day trial on any plan. A card is required to start — we only charge at the end of the trial, and you can cancel anytime before that.
      credits:
        q: What are credits?
        a: Generating videos, images, and carousels uses prepaid credits from your wallet. Every plan already includes a monthly credit allowance, and you can buy more anytime. 1 credit = R$ 1. AI text and captions are included, with no credits spent.
      free_plan:
        q: Is there a free plan?
        a: There's no permanent free plan — every workspace starts with a %{days}-day trial (card required). After that, an active plan is needed to use the app.
      multiple_agencies:
        q: Can I manage more than one agency?
        a: Yes. You can have multiple workspaces — each agency stays isolated, with its own team, clients, and data.
      networks:
        q: Which social networks are supported?
        a: Instagram, Facebook, Threads, TikTok, YouTube, LinkedIn, and X — with direct publishing and native integration on each network.
      client_billing:
        q: How do I get paid by my clients?
        a: 'Through Mercado Pago: Pix (with QR code), boleto, or card, with automatic payment reconciliation.'
      change_plan:
        q: Can I change plans later?
        a: Yes, anytime. The price scales with the size of your operation.
    catalog:
      quadro:
        name: Production board
        eyebrow: The funnel
        card: A 7-stage Kanban with drag-and-drop, campaign chips, and powerful filters.
        headline: Your content, from insight to impact — on a living board.
        subhead: A seven-stage Kanban where each ticket is a piece of content. Drag between columns and the stage changes; the rest of the operation follows along on its own.
        points:
          p1:
            title: Seven color-coded stages
            desc: Ideation, Scoping, Production, Scheduled, Posted, Retro, and Done — each with its own color and fields.
          p2:
            title: Campaign chips
            desc: Each card shows the campaign and the client. Filter by campaign, client, assignee, network, or creative type.
          p3:
            title: Dragging is an action
            desc: Moving a card triggers the status transition, records the history, and refreshes the AI summary — automatically.
          p4:
            title: Subtasks and assignees
            desc: Break work into assignable subtasks that roll up into each person's 'My tasks' screen.
        highlights:
        - Fluid drag-and-drop
        - Combinable filters
        - History of every transition
        - Real time across the team
      estudio:
        name: Creative studio
        eyebrow: AI generation
        card: Generate viral carousels, UGC videos, and images with the brand identity, without leaving the app.
        headline: An AI creative studio inside your operation.
        subhead: Carousels, UGC videos, and images generated with the brand identity, the @handle, and the creator's avatar. From idea to final file without switching tools.
        points:
          p1:
            title: Viral carousels
            desc: 'Generated with virality patterns: brand identity, @handle, creator avatar, and supporting images — included, with no credits spent.'
          p2:
            title: UGC videos
            desc: Videos with realistic AI-generated avatar and voice, built scene by scene and rendered asynchronously.
          p3:
            title: Identity applied
            desc: Brand colors, logo, tone of voice, and default avatar applied automatically to every piece.
          p4:
            title: Per-network captions
            desc: Caption variations following each social network's length rules and hashtags.
        highlights:
        - Carousel, video, and image
        - Brand identity applied
        - Asynchronous rendering
        - Video and image by credits
      inteligencia:
        name: Artificial intelligence
        eyebrow: AI at every stage
        card: Contextual summaries, idea synthesis, automatic scoping, captions, and retrospectives.
        headline: The AI that understands the context of every piece of content.
        subhead: 'AI works at every stage of the funnel: it synthesizes the brief, builds the scope, writes per-network captions, and turns metrics into learning.'
        points:
          p1:
            title: Contextual summary
            desc: Every ticket stage gets an AI-generated summary that evolves along with the content.
          p2:
            title: Idea synthesis
            desc: The brief becomes concrete angles and hooks, ready to turn into scope.
          p3:
            title: Automatic scoping
            desc: An idea becomes a scope with a subtask checklist, created in seconds.
          p4:
            title: Automatic retrospective
            desc: The post's metrics and history become a retro with learnings for the next cycle.
        highlights:
        - Summaries per stage
        - Ideas and scope
        - Per-network captions
        - Performance retrospective
      publicacao:
        name: Publishing & analytics
        eyebrow: Multi-network
        card: Instagram, Facebook, Threads, TikTok, YouTube, LinkedIn, and X — with direct integration.
        headline: Publish to every network and measure everything in one place.
        subhead: Schedule and publish to each social network with direct, native integration, and track every post's metrics in real time.
        points:
          p1:
            title: Seven networks
            desc: Instagram, Facebook, Threads, TikTok, YouTube, LinkedIn, and X, with direct, native integration on each one.
          p2:
            title: Scheduling
            desc: Schedule publishing at the best time and let the system publish for you.
          p3:
            title: Metrics per post
            desc: Reach, views, likes, comments, shares, and saves, synced automatically.
          p4:
            title: Monitoring
            desc: Dated metric snapshots track how each piece of content evolves while it's live.
        highlights:
        - 7 social networks
        - Direct, native integration
        - Synced metrics
        - Performance history
      estrategista:
        name: AI strategist
        eyebrow: AI planning
        card: Chat with the strategist and turn a cadence into a whole month of ready-made tickets.
        headline: A content strategist that fills your board for you.
        subhead: State the cadence and the goal — “2 reels and 1 carousel per week” — and the strategist proposes a complete plan, with dates, briefs, and subtasks, ready to apply in one click.
        points:
          p1:
            title: A conversation that plans
            desc: A multi-turn conversation with a senior strategist who understands the campaign's and brand's context.
          p2:
            title: A month in seconds
            desc: The plan becomes dozens of scheduled tickets — each already in Ideation, with brief and channels defined.
          p3:
            title: Subtasks included
            desc: Every proposed ticket already comes with its subtask checklist and effort estimates.
          p4:
            title: Edit and apply
            desc: Adjust the proposal, apply it all at once, or discard it — the session is saved to resume later.
        highlights:
        - Multi-turn conversation
        - Weeks of plan in 1 click
        - Briefs + subtasks ready
        - Based on the brand and its history
      relatorios:
        name: Campaign reports
        eyebrow: AI audit
        card: 'An end-of-campaign audit deck: KPIs, wins, bottlenecks, and an action plan, generated by AI.'
        headline: The campaign wrap-up becomes a report that impresses the client.
        subhead: When a campaign wraps, AI reads the posts' metrics, the tickets' history, and the lessons learned and builds a performance report with wins, bottlenecks, and next steps.
        points:
          p1:
            title: Consolidated KPIs
            desc: Reach, engagement, and campaign progress brought together in an executive view.
          p2:
            title: Wins and bottlenecks
            desc: AI identifies what worked and where the operation stalled, based on real data.
          p3:
            title: Action plan
            desc: Concrete recommendations on what to repeat and what to adjust next cycle.
          p4:
            title: Client-ready
            desc: An editable deck the agency reviews and presents — with no report to assemble by hand.
        highlights:
        - Automatic KPIs
        - AI analysis
        - Wins + bottlenecks
        - Deck ready to present
      calendario:
        name: Calendar & meetings
        eyebrow: Unified schedule
        card: Scheduled posts and meetings in one place, with drag to reschedule.
        headline: Posts and meetings on the same schedule — no surprises.
        subhead: 'See everything that''s scheduled on a single calendar: publications and client meetings, with month and week views and drag to reschedule.'
        points:
          p1:
            title: Month and week views
            desc: Scheduled posts and meetings side by side, with drag-and-drop to reschedule.
          p2:
            title: Client meetings
            desc: Create Google Calendar meetings with a Google Meet link straight from the app.
          p3:
            title: Reschedule by dragging
            desc: Change a post or meeting's date just by dragging the card on the calendar.
          p4:
            title: Best time
            desc: Best-time-to-publish suggestions based on performance history.
        highlights:
        - Posts + meetings together
        - Google Calendar & Meet
        - Drag to reschedule
        - Month / week view
      cobrancas:
        name: Billing
        eyebrow: Finance
        card: Invoice your clients via Mercado Pago (Pix, boleto, card) with automatic reconciliation.
        headline: Invoice your clients and get paid via Pix — no spreadsheet.
        subhead: Create invoices tied to campaigns, charge by Pix, boleto, or card through Mercado Pago, and let reconciliation happen on its own.
        points:
          p1:
            title: Invoices per campaign
            desc: An invoice can cover one campaign, several, or none — with a clear status from draft to paid.
          p2:
            title: Pix first
            desc: Pix charges with QR code, plus boleto and card, all via Mercado Pago.
          p3:
            title: Automatic reconciliation
            desc: Webhooks and a scheduled sweep confirm the payment and update the status on their own.
          p4:
            title: Reliable status
            desc: A payment is only marked as paid after direct reconciliation with Mercado Pago.
        highlights:
        - Pix, boleto, and card
        - Automatic reconciliation
        - Multi-campaign invoices
        - Native Mercado Pago
