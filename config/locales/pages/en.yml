    terms:
      title: Terms of Use — agencios
      description: The terms and conditions for using the agencios platform.
      heading: Terms of Use
      sections:
        s1:
          h: 1. Acceptance
          body: <p>By creating an account or using agencios (the "Service"), operated by <strong>Gabriel Hamdan Ferreira Tecnologia - ME</strong>, CNPJ <strong>23.858.108/0001-15</strong> ("agencios", "we"), you agree to these Terms of Use and to the <a href="/privacidade">Privacy Policy</a>. If you do not agree, do not use the Service.</p>
        s2:
          h: 2. The Service
          body: "<p>agencios is a SaaS platform for social media and content agencies, with a production board, an AI creative studio, social network publishing, a calendar, meetings, and billing. We may evolve, change, or discontinue features at any time.</p>"
        s3:
          h: 3. Account and eligibility
          body: "<ul><li>You must be at least 18 years old and provide truthful, up-to-date information;</li><li>You are responsible for keeping your credentials confidential and for all activity on your account;</li><li>Notify us immediately of any unauthorized use.</li></ul>"
        s4:
          h: 4. Plans, payment, and free trial
          body: <ul><li>The current plans and prices are on the <a href="/precos">Pricing</a> page;</li><li>The subscription is charged via <strong>Stripe</strong>, on a recurring basis, according to the plan;</li><li>Generating <strong>videos, images, and carousels</strong> consumes <strong>prepaid credits</strong> from the workspace's wallet (1 credit = R$ 1); AI text and captions are included in the plan;</li><li>Credits can be purchased separately in packs, in addition to the monthly allowance included in each plan;</li><li>The trial period <strong>requires a credit card</strong> to start and converts into a subscription at the end, unless canceled;</li><li>You can cancel anytime; access remains until the end of the paid cycle. Taxes may apply as required by law.</li></ul>
        s5:
          h: 5. Acceptable use
          body: "<p>You agree not to:</p><ul><li>Use the Service for illegal, deceptive, defamatory purposes, or purposes that infringe third-party rights;</li><li>Send spam, malware, or content that violates the policies of the integrated social networks;</li><li>Attempt to improperly access, overload, reverse-engineer, or circumvent limits and security;</li><li>Resell or sublicense the Service without authorization.</li></ul>"
        s6:
          h: 6. Your content
          body: "<p>You retain all rights to the content and data you enter (clients, creatives, text, media). You grant us a limited license to host, process, and display that content solely to operate the Service. You represent that you hold the necessary rights to your clients' material and to the social network accounts you connect.</p>"
        s7:
          h: 7. AI-generated content
          body: "<p>AI outputs may contain inaccuracies and must be <strong>reviewed by you</strong> before use or publication. You are responsible for the final content, for compliance with third-party rights, and for each social network's rules.</p>"
        s8:
          h: 8. Third-party integrations
          body: "<p>The Service integrates third-party platforms (social networks, Google, Stripe, Mercado Pago, AI providers) and can be connected to compatible AI assistants via a connector (MCP). Use of these integrations is also subject to the respective providers' terms and policies. We are not responsible for the unavailability or changes of those services.</p>"
        s9:
          h: 9. Intellectual property
          body: "<p>The agencios software, brand, design, and content are owned by us or licensed to us, and protected by law. These Terms do not transfer any right over our intellectual property.</p>"
        s10:
          h: 10. Availability and warranties
          body: <p>We strive to keep the Service available, but it is provided <strong>"as is"</strong>, without warranties of uninterrupted or error-free operation. We may carry out maintenance and updates.</p>
        s11:
          h: 11. Limitation of liability
          body: "<p>To the maximum extent permitted by law, we are not liable for indirect damages, lost profits, or loss of data. Our total liability, where applicable, is limited to the amount you paid in the 12 months prior to the event.</p>"
        s12:
          h: 12. Indemnification
          body: "<p>You agree to indemnify us for third-party claims arising from your use of the Service, your content, or your breach of these Terms.</p>"
        s13:
          h: 13. Suspension and termination
          body: <p>We may suspend or terminate access in case of a breach of these Terms, a security risk, or a legal requirement. You may close your account at any time; after closure, we handle your data as described in the <a href="/privacidade">Privacy Policy</a>.</p>
        s14:
          h: 14. Changes to the Terms
          body: "<p>We may update these Terms. Material changes will be communicated; continued use after they take effect implies agreement.</p>"
        s15:
          h: 15. Governing law and venue
          body: "<p>These Terms are governed by the laws of Brazil. The courts of the district of <strong>Belo Horizonte/MG</strong> are elected as the venue, unless otherwise required by law.</p>"
        s16:
          h: 16. Contact
          body: '<p>Questions: <a href="mailto:suporte@agencios.app">suporte@agencios.app</a>.</p>'
    privacy:
      title: Privacy Policy — agencios
      description: How agencios collects, uses, shares, and protects personal data, in compliance with the LGPD.
      heading: Privacy Policy
      sections:
        s1:
          h: 1. Who we are (Controller)
          body: <p>agencios is operated by <strong>Gabriel Hamdan Ferreira Tecnologia - ME</strong>, registered under CNPJ <strong>23.858.108/0001-15</strong>, headquartered at <strong>Rua Sebastião de Barros, 166, Belo Horizonte - MG</strong> ("agencios", "we"). For LGPD purposes, we are the <strong>Controller</strong> of the personal data processed on our platform, except for the content you enter about your own clients (see section 3.3), where we act as <strong>Processor</strong>.</p><p><strong>Data Protection Officer (DPO):</strong> <a href="mailto:privacidade@agencios.app">privacidade@agencios.app</a>.</p>
        s2:
          h: 2. Who this policy applies to
          body: "<p>It applies to visitors of our website, account holders (agency users), and the people whose data is entered by our clients while using the platform.</p>"
        s3:
          h: 3. Data we process
          body: "<h3>3.1. Registration and account data</h3><ul><li>Name, email, and password (stored encrypted — never in plain text);</li><li>Avatar photo, workspace(s), role, and preferences.</li></ul><h3>3.2. Usage and technical data</h3><ul><li>IP address, device/browser type, pages and actions taken, dates and times;</li><li>Cookies and identifiers (see section 6).</li></ul><h3>3.3. Workspace content (you as Controller)</h3><p>Data about clients, campaigns, tickets, creatives, meetings, and invoices that you enter. This data belongs to your agency; we process it as a <strong>Processor</strong>, following your instructions and only to provide the service.</p><h3>3.4. Integration data</h3><ul><li>Access tokens for social networks, Google Calendar, and Mercado Pago, stored encrypted;</li><li>Payment data processed by the providers (we do not store card numbers).</li></ul>"
        s4:
          h: 4. What we use it for and on what legal basis
          body: "<p>We process personal data on the basis of art. 7 of the LGPD, according to the purpose:</p><ul><li><strong>Performance of the contract</strong> (art. 7, V): to create and operate your account, provide the features, process payments, and give support;</li><li><strong>Compliance with a legal/regulatory obligation</strong> (art. 7, II): tax, accounting, and responding to authorities;</li><li><strong>Legitimate interest</strong> (art. 7, IX): security, fraud prevention, product metrics, and service improvement, always with an impact assessment and respect for your rights;</li><li><strong>Consent</strong> (art. 7, I): analytics/marketing cookies and optional communications — you can withdraw it at any time.</li></ul>"
        s5:
          h: 5. Artificial intelligence
          body: "<p>AI features (summaries, ideas, scope, captions, retrospectives, and creative generation) send the necessary content to model providers (e.g., Anthropic, OpenRouter, Google). That content is used to generate the requested result and not to train third-party models without a legal basis.</p>"
        s6:
          h: 6. Cookies and similar technologies
          body: '<p>We use two categories of cookies:</p><ul><li><strong>Essential</strong>: required for login, security (CSRF), and functionality. They do not depend on consent.</li><li><strong>Analytics/marketing</strong>: they help us understand usage (e.g., Google Analytics via <em>Consent Mode</em>). They are only activated after your consent.</li></ul><p>By default, non-essential cookies remain <strong>disabled</strong> until you accept in the banner. You can change your choice at any time under <strong>"Cookie preferences"</strong> in the footer.</p>'
        s7:
          h: 7. Who we share it with
          body: "<p>We share data only with processors that make the service possible, under contract:</p><ul><li><strong>Payments:</strong> Stripe (subscription) and Mercado Pago (charging your clients);</li><li><strong>Infrastructure:</strong> cloud and storage providers (e.g., AWS S3) and email delivery;</li><li><strong>AI and media:</strong> Anthropic, OpenRouter, Google (image), Cartesia (voice), and supporting media providers;</li><li><strong>Networks and productivity:</strong> Meta (Instagram/Facebook), TikTok, YouTube, LinkedIn, X, and Google (Calendar/Meet, Analytics);</li><li><strong>Authorities</strong>, when required by law or court order.</li></ul><p>We do not sell personal data.</p>"
        s8:
          h: 8. International transfer
          body: "<p>Some providers process data outside Brazil (e.g., the United States). In those cases we adopt adequate safeguards, in accordance with arts. 33 to 36 of the LGPD.</p>"
        s9:
          h: 9. How long we keep it
          body: "<p>We keep the data while your account is active and for the applicable legal periods after closure. After that, the data is deleted or anonymized, except where a legal retention obligation applies.</p>"
        s10:
          h: 10. Your rights (art. 18 of the LGPD)
          body: <p>As a data subject, you may request at any time:</p><ul><li>Confirmation that processing exists and <strong>access</strong> to the data;</li><li><strong>Correction</strong> of incomplete, inaccurate, or outdated data;</li><li><strong>Anonymization, blocking, or deletion</strong> of unnecessary data or data processed in non-compliance;</li><li><strong>Portability</strong> to another provider;</li><li><strong>Deletion</strong> of data processed on the basis of consent;</li><li>Information about <strong>sharing</strong> and about the possibility of <strong>not consenting</strong>;</li><li><strong>Withdrawal of consent</strong> and <strong>review of automated decisions</strong>.</li></ul><p>To exercise these, write to <a href="mailto:privacidade@agencios.app">privacidade@agencios.app</a>. We will respond within the LGPD's time frames. You may also file a complaint with the <a href="https://www.gov.br/anpd" target="_blank" rel="noreferrer">ANPD</a>.</p>
        s11:
          h: 11. Security
          body: "<p>We adopt technical and organizational measures such as encryption in transit (HTTPS) and at rest for secrets, role-based access control, per-workspace isolation, and audit logging. No system is 100% immune; in the event of a relevant incident, we will notify you and the ANPD as required by law.</p>"
        s12:
          h: 12. Children and adolescents
          body: "<p>agencios is intended for people over 18 and does not intentionally collect data from minors.</p>"
        s13:
          h: 13. Changes
          body: "<p>We may update this policy. Material changes will be communicated on the site or by email. The date at the top indicates the latest revision.</p>"
        s14:
          h: 14. Contact
          body: '<p>Privacy questions: <a href="mailto:privacidade@agencios.app">privacidade@agencios.app</a>. See also our <a href="/termos">Terms of Use</a>.</p>'
