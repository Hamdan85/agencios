        - Histórico
        - Criativos
    strategist:
      prompt: 2 reels e 1 carrossel por semana para o lançamento da Bloom, focados em prova social.
      reply: Fechado. Montei um plano de 4 semanas — 12 tickets, cada um com brief, canais e subtarefas. Quer aplicar no quadro?
      tickets:
        t1: Reel — bastidores do produto
        t2: Carrossel — 5 mitos do nicho
        t3: Reel — depoimento de cliente
        t4: Reel — antes e depois
        t5: Carrossel — passo a passo
        t6: Reel — respondendo dúvidas
    faqs:
      trial:
        q: Como funciona o período de teste?
        a: Você tem %{days} dias de teste em qualquer plano. É preciso cadastrar um cartão para começar — só cobramos ao fim do teste, e você pode cancelar antes quando quiser.
      credits:
        q: O que são os créditos?
        a: A geração de vídeos, imagens e carrosséis consome créditos pré-pagos da sua carteira. Cada plano já inclui uma cota mensal de créditos, e você pode comprar mais a qualquer momento. 1 crédito = R$ 1. Textos e legendas com IA são inclusos, sem gastar créditos.
      free_plan:
        q: Existe plano gratuito?
        a: Não há plano gratuito permanente — todo workspace começa com %{days} dias de teste (com cartão). Depois disso, é necessário um plano ativo para usar o app.
      multiple_agencies:
        q: Posso gerenciar mais de uma agência?
        a: Sim. Você pode ter vários workspaces — cada agência fica isolada, com seu próprio time, clientes e dados.
      networks:
        q: Quais redes sociais são suportadas?
        a: Instagram, Facebook, Threads, TikTok, YouTube, LinkedIn e X — com publicação direta e integração nativa em cada rede.
      client_billing:
        q: Como recebo dos meus clientes?
        a: 'Pelo Mercado Pago: Pix (com QR code), boleto ou cartão, com conciliação automática do pagamento.'
      change_plan:
        q: Posso trocar de plano depois?
        a: Sim, a qualquer momento. O preço acompanha o tamanho da sua operação.
    catalog:
      quadro:
        name: Quadro de produção
        eyebrow: O funil
        card: Kanban de 7 etapas com arrastar-e-soltar, chips por campanha e filtros poderosos.
        headline: Seu conteúdo, do insight ao impacto — num quadro vivo.
        subhead: Um Kanban de sete etapas onde cada ticket é uma peça de conteúdo. Arraste entre as colunas e a etapa muda; o resto da operação acompanha sozinho.
        points:
          p1:
            title: Sete etapas coloridas
            desc: Ideação, Escopo, Produção, Agendado, Postado, Retrô e Concluído — cada uma com sua cor e seus campos.
          p2:
            title: Chips por campanha
            desc: Cada card mostra a campanha e o cliente. Filtre por campanha, cliente, responsável, rede ou tipo de criativo.
          p3:
            title: Arrastar é uma ação
            desc: Mover um card dispara a transição de status, registra o histórico e atualiza o resumo de IA — automaticamente.
          p4:
            title: Subtarefas e responsáveis
            desc: Quebre o trabalho em subtarefas atribuíveis que se agregam na tela 'Minhas tarefas' de cada pessoa.
        highlights:
        - Drag-and-drop fluido
        - Filtros combináveis
        - Histórico de cada transição
        - Tempo real entre o time
