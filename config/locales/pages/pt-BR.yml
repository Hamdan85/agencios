    terms:
      title: Termos de Uso — agencios
      description: Os termos e condições de uso da plataforma agencios.
      heading: Termos de Uso
      sections:
        s1:
          h: 1. Aceitação
          body: <p>Ao criar uma conta ou usar o agencios ("Serviço"), operado por <strong>Gabriel Hamdan Ferreira Tecnologia - ME</strong>, CNPJ <strong>23.858.108/0001-15</strong> ("agencios", "nós"), você concorda com estes Termos de Uso e com a <a href="/privacidade">Política de Privacidade</a>. Se não concordar, não use o Serviço.</p>
        s2:
          h: 2. O Serviço
          body: "<p>O agencios é uma plataforma SaaS para agências de social media e conteúdo, com quadro de produção, estúdio criativo com IA, publicação em redes sociais, calendário, reuniões e cobranças. Podemos evoluir, alterar ou descontinuar funcionalidades a qualquer momento.</p>"
        s3:
          h: 3. Conta e elegibilidade
          body: "<ul><li>Você deve ter ao menos 18 anos e fornecer informações verídicas e atualizadas;</li><li>Você é responsável por manter a confidencialidade das credenciais e por toda atividade na sua conta;</li><li>Avise-nos imediatamente sobre uso não autorizado.</li></ul>"
        s4:
          h: 4. Planos, pagamento e teste grátis
          body: <ul><li>Os planos e preços vigentes estão na página de <a href="/precos">Preços</a>;</li><li>A assinatura é cobrada via <strong>Stripe</strong>, de forma recorrente, conforme o plano;</li><li>A geração de <strong>vídeos, imagens e carrosséis</strong> consome <strong>créditos pré-pagos</strong> da carteira do workspace (1 crédito = R$ 1); textos e legendas com IA são inclusos no plano;</li><li>Créditos podem ser adquiridos avulsos em pacotes, além da cota mensal incluída em cada plano;</li><li>O período de teste <strong>exige um cartão de crédito</strong> para iniciar e converte em assinatura ao fim, salvo cancelamento;</li><li>Você pode cancelar quando quiser; o acesso permanece até o fim do ciclo pago. Tributos podem incidir conforme a legislação.</li></ul>
        s5:
          h: 5. Uso aceitável
          body: "<p>Você concorda em não:</p><ul><li>Usar o Serviço para fins ilegais, enganosos, difamatórios ou que violem direitos de terceiros;</li><li>Enviar spam, malware ou conteúdo que viole as políticas das redes sociais integradas;</li><li>Tentar acessar indevidamente, sobrecarregar, fazer engenharia reversa ou contornar limites e segurança;</li><li>Revender ou sublicenciar o Serviço sem autorização.</li></ul>"
        s6:
          h: 6. Seu conteúdo
          body: "<p>Você mantém todos os direitos sobre o conteúdo e os dados que inserir (clientes, criativos, textos, mídias). Você nos concede uma licença limitada para hospedar, processar e exibir esse conteúdo apenas para operar o Serviço. Você declara ter os direitos necessários sobre o material de seus clientes e sobre as contas de redes sociais que conectar.</p>"
        s7:
          h: 7. Conteúdo gerado por IA
          body: "<p>Resultados de IA podem conter imprecisões e devem ser <strong>revisados por você</strong> antes do uso ou publicação. Você é responsável pelo conteúdo final, pela conformidade com direitos de terceiros e pelas regras de cada rede social.</p>"
        s8:
          h: 8. Integrações de terceiros
          body: "<p>O Serviço integra plataformas de terceiros (redes sociais, Google, Stripe, Mercado Pago, provedores de IA) e pode ser conectado a assistentes de IA compatíveis via conector (MCP). O uso dessas integrações também está sujeito aos termos e políticas dos respectivos provedores. Não respondemos por indisponibilidade ou mudanças desses serviços.</p>"
        s9:
          h: 9. Propriedade intelectual
          body: "<p>O software, a marca, o design e os conteúdos do agencios são de nossa propriedade ou licenciados, protegidos por lei. Estes Termos não transferem qualquer direito sobre nossa propriedade intelectual.</p>"
        s10:
          h: 10. Disponibilidade e garantias
          body: <p>Empenhamo-nos para manter o Serviço disponível, mas ele é fornecido <strong>"no estado em que se encontra"</strong>, sem garantias de operação ininterrupta ou livre de erros. Podemos realizar manutenções e atualizações.</p>
        s11:
          h: 11. Limitação de responsabilidade
          body: "<p>Na máxima extensão permitida em lei, não nos responsabilizamos por danos indiretos, lucros cessantes ou perda de dados. Nossa responsabilidade total, quando cabível, limita-se ao valor pago por você nos 12 meses anteriores ao evento.</p>"
        s12:
          h: 12. Indenização
          body: "<p>Você concorda em nos indenizar por reclamações de terceiros decorrentes do seu uso do Serviço, do seu conteúdo ou da violação destes Termos.</p>"
        s13:
          h: 13. Suspensão e encerramento
          body: <p>Podemos suspender ou encerrar o acesso em caso de violação destes Termos, risco à segurança ou exigência legal. Você pode encerrar sua conta a qualquer momento; após o encerramento, tratamos seus dados conforme a <a href="/privacidade">Política de Privacidade</a>.</p>
        s14:
          h: 14. Alterações nos Termos
          body: "<p>Podemos atualizar estes Termos. Mudanças relevantes serão comunicadas; o uso continuado após a vigência implica concordância.</p>"
        s15:
          h: 15. Lei aplicável e foro
          body: "<p>Estes Termos são regidos pelas leis do Brasil. Fica eleito o foro da comarca de <strong>Belo Horizonte/MG</strong>, salvo disposição legal em contrário.</p>"
        s16:
          h: 16. Contato
          body: '<p>Dúvidas: <a href="mailto:suporte@agencios.app">suporte@agencios.app</a>.</p>'
    privacy:
      title: Política de Privacidade — agencios
      description: Como a agencios coleta, usa, compartilha e protege dados pessoais, em conformidade com a LGPD.
      heading: Política de Privacidade
      sections:
        s1:
          h: 1. Quem somos (Controlador)
          body: <p>O agencios é operado por <strong>Gabriel Hamdan Ferreira Tecnologia - ME</strong>, inscrita no CNPJ <strong>23.858.108/0001-15</strong>, com sede na <strong>Rua Sebastião de Barros, 166, Belo Horizonte - MG</strong> ("agencios", "nós"). Para fins da LGPD, somos o <strong>Controlador</strong> dos dados pessoais tratados em nossa plataforma, exceto quanto ao conteúdo que você insere sobre seus próprios clientes (veja a seção 3.3), em que atuamos como <strong>Operador</strong>.</p><p><strong>Encarregado pelo Tratamento de Dados (DPO):</strong> <a href="mailto:privacidade@agencios.app">privacidade@agencios.app</a>.</p>
        s2:
          h: 2. A quem esta política se aplica
          body: "<p>Aplica-se a visitantes do nosso site, titulares de conta (usuários das agências) e às pessoas cujos dados são inseridos por nossos clientes no uso da plataforma.</p>"
        s3:
          h: 3. Dados que tratamos
          body: "<h3>3.1. Dados de cadastro e conta</h3><ul><li>Nome, e-mail e senha (armazenada de forma criptografada — nunca em texto puro);</li><li>Foto de avatar, workspace(s), papel e preferências.</li></ul><h3>3.2. Dados de uso e técnicos</h3><ul><li>Endereço IP, tipo de dispositivo/navegador, páginas e ações realizadas, datas e horários;</li><li>Cookies e identificadores (veja a seção 6).</li></ul><h3>3.3. Conteúdo do workspace (você como Controlador)</h3><p>Dados de clientes, campanhas, tickets, criativos, reuniões e faturas que você insere. Esses dados pertencem à sua agência; tratamos como <strong>Operador</strong>, seguindo suas instruções e apenas para prestar o serviço.</p><h3>3.4. Dados de integrações</h3><ul><li>Tokens de acesso a redes sociais, Google Calendar e Mercado Pago, armazenados de forma criptografada;</li><li>Dados de pagamento processados pelos provedores (não armazenamos números de cartão).</li></ul>"
        s4:
          h: 4. Para que usamos e com qual base legal
          body: "<p>Tratamos dados pessoais com fundamento no art. 7º da LGPD, conforme a finalidade:</p><ul><li><strong>Execução do contrato</strong> (art. 7º, V): criar e operar sua conta, prestar as funcionalidades, processar pagamentos e dar suporte;</li><li><strong>Cumprimento de obrigação legal/regulatória</strong> (art. 7º, II): fiscal, contábil e atendimento a autoridades;</li><li><strong>Legítimo interesse</strong> (art. 7º, IX): segurança, prevenção a fraudes, métricas de produto e melhoria do serviço, sempre com avaliação de impacto e respeito aos seus direitos;</li><li><strong>Consentimento</strong> (art. 7º, I): cookies de análise/marketing e comunicações opcionais — você pode revogar a qualquer momento.</li></ul>"
        s5:
          h: 5. Inteligência artificial
          body: "<p>Funcionalidades de IA (resumos, ideias, escopo, legendas, retrospectivas e geração de criativos) enviam o conteúdo necessário a provedores de modelos (ex.: Anthropic, OpenRouter, Google). Esse conteúdo é usado para gerar o resultado solicitado e não para treinar modelos de terceiros sem base legal.</p>"
        s6:
          h: 6. Cookies e tecnologias semelhantes
          body: '<p>Usamos duas categorias de cookies:</p><ul><li><strong>Essenciais</strong>: necessários para login, segurança (CSRF) e funcionamento. Não dependem de consentimento.</li><li><strong>Análise/marketing</strong>: ajudam a entender o uso (ex.: Google Analytics via <em>Consent Mode</em>). Só são ativados após o seu consentimento.</li></ul><p>Por padrão, cookies não essenciais ficam <strong>desativados</strong> até você aceitar no banner. Você pode mudar sua escolha a qualquer momento em <strong>"Preferências de cookies"</strong> no rodapé.</p>'
        s7:
          h: 7. Com quem compartilhamos
          body: "<p>Compartilhamos dados apenas com operadores que viabilizam o serviço, sob contrato:</p><ul><li><strong>Pagamentos:</strong> Stripe (assinatura) e Mercado Pago (cobrança aos seus clientes);</li><li><strong>Infraestrutura:</strong> provedores de nuvem e armazenamento (ex.: AWS S3) e envio de e-mail;</li><li><strong>IA e mídia:</strong> Anthropic, OpenRouter, Google (imagem), Cartesia (voz) e provedores de mídia de apoio;</li><li><strong>Redes e produtividade:</strong> Meta (Instagram/Facebook), TikTok, YouTube, LinkedIn, X e Google (Calendar/Meet, Analytics);</li><li><strong>Autoridades</strong>, quando exigido por lei ou ordem judicial.</li></ul><p>Não vendemos dados pessoais.</p>"
        s8:
          h: 8. Transferência internacional
          body: "<p>Alguns provedores processam dados fora do Brasil (ex.: Estados Unidos). Nesses casos adotamos salvaguardas adequadas, conforme os arts. 33 a 36 da LGPD.</p>"
        s9:
          h: 9. Por quanto tempo guardamos
          body: "<p>Mantemos os dados enquanto sua conta estiver ativa e pelos prazos legais aplicáveis após o encerramento. Depois disso, os dados são eliminados ou anonimizados, salvo obrigação legal de retenção.</p>"
        s10:
          h: 10. Seus direitos (art. 18 da LGPD)
          body: <p>Como titular, você pode solicitar a qualquer momento:</p><ul><li>Confirmação da existência de tratamento e <strong>acesso</strong> aos dados;</li><li><strong>Correção</strong> de dados incompletos, inexatos ou desatualizados;</li><li><strong>Anonimização, bloqueio ou eliminação</strong> de dados desnecessários ou tratados em desconformidade;</li><li><strong>Portabilidade</strong> a outro fornecedor;</li><li><strong>Eliminação</strong> dos dados tratados com base no consentimento;</li><li>Informação sobre <strong>compartilhamento</strong> e sobre a possibilidade de <strong>não consentir</strong>;</li><li><strong>Revogação do consentimento</strong> e <strong>revisão de decisões automatizadas</strong>.</li></ul><p>Para exercer, escreva para <a href="mailto:privacidade@agencios.app">privacidade@agencios.app</a>. Responderemos nos prazos da LGPD. Você também pode reclamar à <a href="https://www.gov.br/anpd" target="_blank" rel="noreferrer">ANPD</a>.</p>
        s11:
          h: 11. Segurança
          body: "<p>Adotamos medidas técnicas e organizacionais como criptografia em trânsito (HTTPS) e em repouso para segredos, controle de acesso por papel, isolamento por workspace e registro de auditoria. Nenhum sistema é 100% imune; em caso de incidente relevante, comunicaremos você e a ANPD conforme a lei.</p>"
        s12:
          h: 12. Crianças e adolescentes
          body: "<p>O agencios é destinado a maiores de 18 anos e não coleta intencionalmente dados de menores.</p>"
        s13:
          h: 13. Alterações
          body: "<p>Podemos atualizar esta política. Mudanças relevantes serão comunicadas no site ou por e-mail. A data no topo indica a última revisão.</p>"
        s14:
          h: 14. Contato
          body: '<p>Dúvidas sobre privacidade: <a href="mailto:privacidade@agencios.app">privacidade@agencios.app</a>. Veja também nossos <a href="/termos">Termos de Uso</a>.</p>'
