        preheader: "Your account is ready. Welcome to agencios."
        eyebrow: "Welcome"
        body_html: "Your <strong>agencios</strong> account is ready — the operating system for your content agency. Manage clients, campaigns, the production board, calendar, AI-generated creatives, and invoicing, all in one place."
