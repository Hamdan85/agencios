# sidekiq-cron schedule — loaded on Sidekiq server startup (see
# config/initializers/sidekiq.rb).

monitor_scheduled_posts:
  cron: "*/5 * * * *"          # every 5 minutes
  class: "MonitorScheduledPostsJob"
  queue: default

sync_post_metrics:
  cron: "0 */4 * * *"          # every 4 hours
  class: "Posts::SyncMetricsJob"
  queue: media

sync_account_insights:
  cron: "20 2 * * *"           # daily at 02:20 — builds account-metric history
  class: "Social::SyncAccountInsightsJob"
  queue: media

refresh_social_tokens:
  cron: "30 3 * * *"           # daily at 03:30
  class: "Social::RefreshTokenJob"
  queue: low

reconcile_seats:
  cron: "0 4 * * *"            # daily at 04:00
  class: "ReconcileSeatsJob"
  queue: low

grant_godfathered_credits:
  cron: "10 0 1 * *"          # monthly, 1st at 00:10 — refill godfathered allotments
  class: "GrantGodfatheredCreditsJob"
  queue: low

reconcile_invoices:
  cron: "*/30 * * * *"         # every 30 minutes (Mercado Pago Pix sweep)
  class: "Invoices::ReconcileJob"
  queue: default

purge_expired_sessions:
  cron: "0 5 * * 0"            # weekly, Sunday 05:00
  class: "PurgeExpiredSessionsJob"
  queue: low

send_daily_ticket_digest:
  cron: "0 7 * * *"            # daily at 07:00 — start of day
  class: "SendDailyTicketDigestJob"
  queue: low
